[Settings]
; Your browser user agent string. Find yours at https://whatismybrowser.com/detect/what-is-my-user-agent/
user_agent = 

; Sort output by price — only set ONE of these to True, not both.
high_price_first = False
low_price_first  = False

; If True, new results are merged with the most recent previous output file
; instead of always creating a fresh file. Duplicates (same URL) keep the newest data.
append_mode = False

; How many seconds to wait after page load before scraping (increase if pages load slowly)
page_load_wait = 5
